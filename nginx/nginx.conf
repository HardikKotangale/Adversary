# Reverse proxy fronting the Adversary frontend + backend containers.
# Routes /api/* to the backend (with SSE-safe settings — debate calls can run
# for a minute or more) and everything else to the Next.js frontend.
#
# The `resolver` + `set $var ...; proxy_pass $var;` pattern below is
# deliberate: without it, nginx resolves the backend/frontend container
# hostnames to an IP once, at its own startup, and never again. If those
# containers get rebuilt on a later deploy (new IP on Docker's network),
# nginx keeps proxying to the stale, now-dead IP and every request 502s
# until nginx itself is restarted. Routing through a variable forces nginx
# to re-resolve via Docker's embedded DNS (127.0.0.11) on the `valid`
# interval instead of caching the address forever.

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $backend_upstream http://backend:4000;
        proxy_pass $backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Server-Sent Events: disable buffering, keep the connection open
        # long enough for slow model calls to complete.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding off;
    }

    location /health {
        set $backend_upstream http://backend:4000;
        proxy_pass $backend_upstream/health;
    }

    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
